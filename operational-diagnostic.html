<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operational Diagnostic Assessment — BW Advisory Solutions</title>
    <link rel="icon" type="image/webp" href="https://bwadvisorysolutions.com.au/shield.webp" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@1,700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        gold: '#C9A84C',
                        silver: '#C0C8D0',
                    },
                    fontFamily: {
                        sans: ['Calibri', 'Inter', 'sans-serif'],
                        serif: ['Cormorant Garamond', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    borderRadius: { '3xl': '2rem', '4xl': '3rem' }
                }
            }
        }
    </script>
    <style>
        .noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; pointer-events: none; opacity: 0.03; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .magnetic-button:hover { transform: scale(1.02); }
        .scale-btn.selected { background-color: #C9A84C; color: #0F172A; border-color: #C9A84C; transform: scale(1.1); }
        .choice-btn.selected { background-color: rgba(201, 168, 76, 0.1); border-color: #C9A84C; }
        .choice-btn.selected .indicator { background-color: #C9A84C; border-color: #C9A84C; }
    </style>
</head>
<body class="bg-primary text-white/80 font-sans min-h-screen selection:bg-gold/30 overflow-x-hidden">
    <div class="noise-overlay"></div>
    <div id="progress-container" class="fixed top-0 left-0 w-full h-1 bg-silver/5 z-[60] hidden"><div id="progress-bar" class="h-full bg-gold transition-all duration-500 ease-out" style="width: 0%"></div></div>
    <nav class="fixed top-8 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-xl py-3 px-6 rounded-full border border-silver/10 backdrop-blur-xl bg-primary/40 flex items-center justify-between">
        <a href="https://bwadvisorysolutions.com.au" class="font-bold tracking-tighter text-white">BW<span class="text-gold">.</span></a>
        <div class="flex gap-6 text-[10px] font-mono tracking-widest uppercase text-white/40"><span id="step-counter" class="hidden text-gold">01 // 10</span><span class="hidden md:inline">Operational Diagnostic</span></div>
    </nav>
    <div id="app-container" class="relative pt-32 pb-20 px-6 max-w-4xl mx-auto min-h-screen flex flex-col justify-center"><div id="screen-mount" class="w-full"></div></div>
    <script>
        'use strict';
        const API = '/.netlify/functions/diagnostic-api';
        const QUESTIONS = [
            { id: 'q1', type: 'text', label: 'Operational Priorities', q: 'What are the two or three most significant operational challenges your organisation is facing right now?', placeholder: 'Describe your most pressing operational issues\u2026', },
            { id: 'q2', type: 'scale', label: 'Workflow Efficiency', q: 'How effectively does your current workflow turn inputs into outputs without significant delay, rework, or waste?', low: 'Significant friction', high: 'Highly efficient', },
            { id: 'q3', type: 'multiselect', label: 'Breakdown Location', q: 'Where is the most visible operational breakdown?', subtitle: 'Select up to two areas.', options: ['Process & workflow', 'People & capability', 'Technology & tools', 'Communication & coordination', 'Data & reporting', 'Resource allocation'], max: 2, },
            { id: 'q4', type: 'scale', label: 'Execution Consistency', q: 'How consistently does your team execute tasks to the required standard without close supervision?', low: 'Significant variation', high: 'Consistently reliable', },
            { id: 'q5', type: 'text', label: 'Failure Analysis', q: 'Describe a recent operational failure or near-miss. What caused it and what was the response?', placeholder: 'What happened and how was it handled\u2026', },
            { id: 'q6', type: 'select', label: 'Performance Measurement', q: 'Which best describes how operational performance is measured in your organisation?', options: ['We measure well and act on the results', 'We measure but rarely act consistently', 'Our measures are incomplete or unreliable', 'No formal measurement exists'], },
            { id: 'q7', type: 'scale', label: 'Role Clarity', q: 'How clearly do your operational teams understand what success looks like for their specific role?', low: 'Limited clarity', high: 'Fully understood', },
            { id: 'q8', type: 'text', label: 'Change Required', q: 'What would need to change at the operational level for your organisation to perform measurably better within six months?', placeholder: 'Describe the changes that would move the dial\u2026', },
            { id: 'q9', type: 'multiselect', label: 'Change Barriers', q: 'What is preventing that change from happening?', subtitle: 'Select up to two.', options: ['Unclear accountability', 'Limited resources', 'Skills or capability gaps', 'Technology constraints', 'Cultural resistance', 'Leadership bottleneck'], max: 2, },
            { id: 'q10', type: 'text', label: 'Success Definition', q: 'What does strong operational performance look like for your organisation in 12 months?', placeholder: 'Describe the operational state you are working toward\u2026', },
        ];
        const N = QUESTIONS.length; const S_INTRO = 0, S_CONTACT = 1, S_Q0 = 2; const S_QEND = S_Q0 + N - 1, S_SUBMITTING = S_QEND + 1, S_DONE = S_QEND + 2;
        let step = S_INTRO; const state = { prospect: { name: '', organisation: '', role: '', email: '' }, answers: new Array(N).fill(null) }; let scaleVal = null, choiceSet = new Set(), radioVal = null;
        function render() {
            const mount = document.getElementById('screen-mount'), counter = document.getElementById('step-counter'), progress = document.getElementById('progress-container'), bar = document.getElementById('progress-bar');
            if (step >= S_CONTACT && step <= S_QEND) { counter.classList.remove('hidden'); progress.classList.remove('hidden'); if (step >= S_Q0) { const pct = ((step-S_Q0+1)/N)*100; bar.style.width = pct+'%'; counter.innerText = `${String(step-S_Q0+1).padStart(2,'0')} // ${N}`; } else { bar.style.width = '2%'; counter.innerText = 'SETUP'; } } else { counter.classList.add('hidden'); progress.classList.add('hidden'); }
            let html = ''; if (step === S_INTRO) html = renderIntro(); else if (step === S_CONTACT) html = renderContact(); else if (step >= S_Q0 && step <= S_QEND) html = renderQuestion(step - S_Q0); else if (step === S_SUBMITTING) html = renderSubmitting(); else if (step === S_DONE) html = renderDone();
            gsap.to(mount, { opacity: 0, y: -20, duration: 0.3, onComplete: () => { mount.innerHTML = html; if (step === S_CONTACT) populateContact(); if (step >= S_Q0 && step <= S_QEND) populateQuestion(step - S_Q0); gsap.to(mount, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }); }});
        }
        function renderIntro() { return `<div class="text-left space-y-12"><div><p class="text-gold font-mono text-xs tracking-[0.3em] uppercase mb-6">Operational Diagnostic</p><h1 class="text-5xl md:text-7xl font-bold tracking-tight leading-[0.9] text-white mb-8">Audit the machine.<br><span class="font-serif italic text-gold text-6xl md:text-8xl">Uncover the friction.</span></h1><p class="text-white/50 text-lg md:text-xl font-light max-w-xl leading-relaxed mb-12">This assessment identifies the breakdowns and capability gaps that prevent your organisation from performing at its peak.</p><button onclick="step=S_CONTACT;render()" class="magnetic-button bg-gold text-navy font-bold px-12 py-5 rounded-2xl tracking-[0.2em] uppercase text-sm hover:bg-silver transition-all shadow-xl">Begin Audit</button></div></div>`; }
        function renderContact() { return `<div class="max-w-2xl space-y-12"><div><h2 class="text-4xl font-bold text-white mb-4 tracking-tight">Before We Begin</h2><p class="text-white/50 font-light">A few essentials to personalise your report.</p></div><div class="space-y-8"><div class="grid grid-cols-1 md:grid-cols-2 gap-8"><div class="space-y-2 group"><label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-white/40">Full Name</label><input type="text" id="c-name" placeholder="Name" class="w-full bg-transparent border-b border-silver/20 py-3 text-lg font-light focus:border-gold transition-all"></div><div class="space-y-2 group"><label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-white/40">Organisation</label><input type="text" id="c-org" placeholder="Company" class="w-full bg-transparent border-b border-silver/20 py-3 text-lg font-light focus:border-gold transition-all"></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-8"><div class="space-y-2 group"><label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-white/40">Role</label><input type="text" id="c-role" placeholder="Title" class="w-full bg-transparent border-b border-silver/20 py-3 text-lg font-light focus:border-gold transition-all"></div><div class="space-y-2 group"><label class="block text-[10px] font-bold tracking-[0.2em] uppercase text-white/40">Email</label><input type="email" id="c-email" placeholder="your@email.com" class="w-full bg-transparent border-b border-silver/20 py-3 text-lg font-light focus:border-gold transition-all"></div></div></div><div class="flex gap-4"><button onclick="step=S_INTRO;render()" class="text-white/30 hover:text-white text-xs tracking-widest uppercase transition-colors">Back</button><button onclick="nextStep()" class="magnetic-button bg-gold text-navy font-bold px-10 py-4 rounded-xl tracking-[0.2em] uppercase text-[10px]">Continue</button></div></div>`; }
        function renderQuestion(qi) { const q = QUESTIONS[qi]; let inputHtml = ''; if (q.type === 'text') inputHtml = `<textarea id="q-ans" placeholder="${q.placeholder || ''}" class="w-full bg-transparent border-b border-silver/20 py-4 text-2xl font-light focus:border-gold transition-all resize-none min-h-[150px] placeholder:text-white/5"></textarea>`; else if (q.type === 'scale') inputHtml = `<div class="flex justify-between text-[10px] font-mono tracking-widest text-white/30 mb-6 uppercase"><span>${q.low}</span><span>${q.high}</span></div><div class="grid grid-cols-5 gap-4">${[1,2,3,4,5].map(v => `<button onclick="pickScale(${v})" data-v="${v}" class="scale-btn border border-silver/10 py-8 rounded-2xl font-bold text-2xl hover:border-gold/40">${v}</button>`).join('')}</div>`; else if (q.type === 'multiselect' || q.type === 'select') inputHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">${q.options.map((o, i) => `<button onclick="${q.type === 'select' ? `pickRadio(${i})` : `toggleChoice(${i})`}" data-i="${i}" class="choice-btn group text-left border border-silver/10 p-6 rounded-2xl hover:border-gold/40 transition-all flex items-center gap-4"><div class="indicator w-4 h-4 rounded-sm border border-silver/20 flex-shrink-0 transition-all"></div><span class="text-sm font-light leading-relaxed">${o}</span></button>`).join('')}</div>`; return `<div class="space-y-12"><div class="space-y-4"><p class="text-gold font-mono text-[10px] tracking-[0.4em] uppercase opacity-50">${q.label}</p><h2 class="text-4xl md:text-5xl font-serif italic text-white leading-[1.1] tracking-tight">${q.q}</h2>${q.subtitle ? `<p class="text-white/30 font-light text-sm tracking-wide">${q.subtitle}</p>` : ''}</div><div class="py-8">${inputHtml}</div><div class="flex items-center gap-8 pt-8 border-t border-silver/10"><button onclick="prevStep()" class="text-white/30 hover:text-white text-xs tracking-widest uppercase transition-colors">Previous</button><button onclick="nextStep()" class="magnetic-button bg-gold text-navy font-bold px-12 py-5 rounded-2xl tracking-[0.2em] uppercase text-xs">${step === S_QEND ? 'Complete' : 'Next'}</button></div></div>`; }
        function renderSubmitting() { return `<div class="text-center space-y-8 py-20"><div class="w-16 h-16 border-2 border-gold/20 border-t-gold rounded-full animate-spin mx-auto"></div><h2 class="text-2xl font-bold tracking-widest uppercase text-white">Processing Intelligence</h2></div>`; }
        function renderDone() { return `<div class="text-center space-y-12 py-20"><div class="w-20 h-20 border border-gold rounded-full flex items-center justify-center text-gold mx-auto"><svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 13l4 4L19 7"></path></svg></div><div class="space-y-4"><h2 class="text-4xl font-bold text-white">Audit Complete.</h2><p class="text-white/50 font-light max-w-md mx-auto">Your report will be sent within 24 hours.</p></div><a href="https://bwadvisorysolutions.com.au" class="inline-block border border-silver/10 px-12 py-5 rounded-2xl text-[10px] font-bold tracking-[0.3em] uppercase hover:bg-silver hover:text-navy transition-all">Return to Homepage</a></div>`; }
        function pickScale(v) { scaleVal = v; document.querySelectorAll('.scale-btn').forEach(b => b.classList.toggle('selected', +b.dataset.v === v)); }
        function toggleChoice(i) { const q = QUESTIONS[step - S_Q0], btn = document.querySelector(`.choice-btn[data-i="${i}"]`); if (choiceSet.has(i)) { choiceSet.delete(i); btn.classList.remove('selected'); } else { if (q.max && choiceSet.size >= q.max) { const first = [...choiceSet][0]; choiceSet.delete(first); document.querySelector(`.choice-btn[data-i="${first}"]`).classList.remove('selected'); } choiceSet.add(i); btn.classList.add('selected'); } }
        function pickRadio(i) { radioVal = i; document.querySelectorAll('.choice-btn').forEach((b, idx) => b.classList.toggle('selected', idx === i)); }
        function populateContact() { document.getElementById('c-name').value = state.prospect.name; document.getElementById('c-org').value = state.prospect.organisation; document.getElementById('c-role').value = state.prospect.role; document.getElementById('c-email').value = state.prospect.email; }
        function saveContact() { state.prospect.name = document.getElementById('c-name').value; state.prospect.organisation = document.getElementById('c-org').value; state.prospect.role = document.getElementById('c-role').value; state.prospect.email = document.getElementById('c-email').value; }
        function populateQuestion(qi) { const q = QUESTIONS[qi], s = state.answers[qi]; if(!s)return; if(q.type==='text')document.getElementById('q-ans').value=s; else if(q.type==='scale')pickScale(s); else if(q.type==='multiselect'){choiceSet=new Set(s.map(o=>q.options.indexOf(o))); choiceSet.forEach(i=>document.querySelector(`.choice-btn[data-i="${i}"]`)?.classList.add('selected'));} else if(q.type==='select')pickRadio(q.options.indexOf(s)); }
        function saveQuestion(qi) { const q = QUESTIONS[qi]; if(q.type==='text')state.answers[qi]=document.getElementById('q-ans').value.trim(); else if(q.type==='scale')state.answers[qi]=scaleVal; else if(q.type==='multiselect')state.answers[qi]=[...choiceSet].map(i=>q.options[i]); else if(q.type==='select')state.answers[qi]=radioVal!==null?q.options[radioVal]:null; }
        function validateContact() { return !!(document.getElementById('c-name').value && document.getElementById('c-email').value); }
        function validateQuestion(qi) { const q=QUESTIONS[qi]; if(q.type==='text')return !!document.getElementById('q-ans').value; if(q.type==='scale')return scaleVal!==null; if(q.type==='multiselect')return choiceSet.size>0; if(q.type==='select')return radioVal!==null; return true; }
        function nextStep() { if(step===S_CONTACT){if(!validateContact())return;saveContact();} else if(step>=S_Q0){if(!validateQuestion(step-S_Q0))return;saveQuestion(step-S_Q0);if(step===S_QEND){submit();return;}} step++;render();window.scrollTo(0,0); }
        function prevStep() { step--;render();window.scrollTo(0,0); }
        async function submit() { step = S_SUBMITTING; render(); const answers = QUESTIONS.map((q, i) => ({ question: q.q, answer: String(state.answers[i]) })); try { const res = await fetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action: 'submit-diagnostic', type: 'operational', prospect: state.prospect, answers }) }); const json = await res.json(); if(json.ok){step=S_DONE;render();} else throw new Error(); } catch(e) { alert('Failed. Please try again.'); step=S_QEND;render(); } }
        function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
        render();
    </script>
</body>
</html>
